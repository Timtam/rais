name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Build release rais binary (no GUI feature)
        run: cargo build --release -p rais

  artifacts:
    name: Artifact (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            artifact_name: RAIS.exe
          - os: macos-latest
            platform_id: macos
            artifact_name: RAIS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Windows GUI build prerequisites
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          choco install llvm ninja --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS GUI build prerequisites
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Build release rais binary with GUI feature
        run: cargo build --release -p rais --features gui

      - name: Stage Windows artifact
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\rais.exe dist\${{ matrix.artifact_name }} -Force
          $Hash = (Get-FileHash dist\${{ matrix.artifact_name }} -Algorithm SHA256).Hash.ToLowerInvariant()
          "{0}  {1}" -f $Hash, "${{ matrix.artifact_name }}" | Set-Content dist\${{ matrix.artifact_name }}.sha256

      - name: Stage macOS artifact
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/rais dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}
          shasum -a 256 dist/${{ matrix.artifact_name }} | awk '{print tolower($1) "  ${{ matrix.artifact_name }}"}' > dist/${{ matrix.artifact_name }}.sha256

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: rais-${{ matrix.platform_id }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.sha256
          if-no-files-found: error
