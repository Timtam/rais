name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Build release rais binary (no GUI feature)
        run: cargo build --release -p rais

  artifacts:
    name: Artifact (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            extension: ".exe"
          - os: macos-latest
            platform_id: macos
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Windows GUI build prerequisites
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          choco install llvm ninja --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS GUI build prerequisites
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Build release rais binary with GUI feature
        run: cargo build --release -p rais --features gui

      - name: Resolve artifact name
        shell: bash
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
          RUNNER_ARCH: ${{ runner.arch }}
          EXTENSION: ${{ matrix.extension }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # CI artifacts embed the workspace version + a short git sha so
          # successive PR builds don't collide; release.yml uses the tag
          # directly. Mirrors the release-time naming so users see the same
          # filename pattern for snapshots and stable downloads.
          BASE_VERSION="$(awk -F'\"' '/^version *= *\"/{print $2; exit}' Cargo.toml)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="${BASE_VERSION}-${SHORT_SHA}"
          case "$RUNNER_ARCH" in
            X64) ARCH="x86_64" ;;
            ARM64) ARCH="aarch64" ;;
            X86) ARCH="i686" ;;
            ARM) ARCH="armv7" ;;
            *) echo "unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
          esac
          ARTIFACT_NAME="rais-${VERSION}-${PLATFORM_ID}-${ARCH}${EXTENSION}"
          echo "RAIS_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RAIS_ARCH=${ARCH}" >> "$GITHUB_ENV"
          echo "RAIS_ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Stage Windows artifact
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\rais.exe "dist\$env:RAIS_ARTIFACT_NAME" -Force
          $Hash = (Get-FileHash "dist\$env:RAIS_ARTIFACT_NAME" -Algorithm SHA256).Hash.ToLowerInvariant()
          "{0}  {1}" -f $Hash, $env:RAIS_ARTIFACT_NAME | Set-Content "dist\$env:RAIS_ARTIFACT_NAME.sha256"

      - name: Stage macOS artifact
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/rais "dist/${RAIS_ARTIFACT_NAME}"
          chmod +x "dist/${RAIS_ARTIFACT_NAME}"
          shasum -a 256 "dist/${RAIS_ARTIFACT_NAME}" | awk -v name="${RAIS_ARTIFACT_NAME}" '{print tolower($1) "  " name}' > "dist/${RAIS_ARTIFACT_NAME}.sha256"

      - name: Build macOS .app bundle
        if: matrix.platform_id == 'macos'
        shell: bash
        env:
          RAIS_BUNDLE_ZIP: ${{ env.RAIS_ARTIFACT_NAME }}.app.zip
        run: |
          # Snapshot bundle for Finder launches. The bare binary above is
          # still the self-update asset; this zip is the double-clickable
          # alternative. Ad-hoc signing keeps Apple Silicon Macs from
          # flagging the download as "damaged" — Developer ID signing only
          # happens in release.yml when secrets are configured.
          bash packaging/macos/build-bundle.sh \
            --binary "target/release/rais" \
            --version "${RAIS_VERSION}" \
            --out "dist" \
            --zip-name "${RAIS_BUNDLE_ZIP}" \
            --adhoc-sign
          echo "RAIS_BUNDLE_ZIP=${RAIS_BUNDLE_ZIP}" >> "$GITHUB_ENV"

      - name: Upload Windows artifact
        if: matrix.platform_id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: rais-${{ matrix.platform_id }}-${{ env.RAIS_ARCH }}
          path: |
            dist/${{ env.RAIS_ARTIFACT_NAME }}
            dist/${{ env.RAIS_ARTIFACT_NAME }}.sha256
          if-no-files-found: error

      - name: Upload macOS artifact
        if: matrix.platform_id == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: rais-${{ matrix.platform_id }}-${{ env.RAIS_ARCH }}
          path: |
            dist/${{ env.RAIS_ARTIFACT_NAME }}
            dist/${{ env.RAIS_ARTIFACT_NAME }}.sha256
            dist/${{ env.RAIS_BUNDLE_ZIP }}
            dist/${{ env.RAIS_BUNDLE_ZIP }}.sha256
          if-no-files-found: error
