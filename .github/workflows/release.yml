name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release bundle (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            archive_name: RAIS-windows.zip
          - os: macos-latest
            platform_id: macos
            archive_name: RAIS-macos.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Windows GUI build prerequisites
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          choco install llvm ninja --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS GUI build prerequisites
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Run release validation
        run: |
          cargo fmt --all --check
          cargo test -p rais-core
          cargo test -p rais-ui-wxdragon
          cargo test -p rais-cli
          cargo check -p rais-cli

      - name: Build release GUI artifact and CLI
        run: |
          cargo build --release -p rais-ui-wxdragon --features gui
          cargo build --release -p rais-cli

      - name: Package Windows release bundle
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item target\release\rais-ui-wxdragon.exe dist\windows\RAIS.exe -Force
          Copy-Item target\release\rais-cli.exe dist\windows\rais-cli.exe -Force
          if (Test-Path target\release\rais-ui-wxdragon.pdb) {
            Copy-Item target\release\rais-ui-wxdragon.pdb dist\windows\RAIS.pdb -Force
          }
          if (Test-Path target\release\rais-cli.pdb) {
            Copy-Item target\release\rais-cli.pdb dist\windows\rais-cli.pdb -Force
          }
          Compress-Archive -Path dist\windows\* -DestinationPath dist\${{ matrix.archive_name }} -Force
          $Hash = (Get-FileHash dist\${{ matrix.archive_name }} -Algorithm SHA256).Hash.ToLowerInvariant()
          "{0}  {1}" -f $Hash, "${{ matrix.archive_name }}" | Set-Content dist\${{ matrix.archive_name }}.sha256

      - name: Package macOS release bundle
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          mkdir -p dist/macos
          cp target/release/rais-ui-wxdragon dist/macos/RAIS
          cp target/release/rais-cli dist/macos/rais-cli
          ditto -c -k --sequesterRsrc --keepParent dist/macos "dist/${{ matrix.archive_name }}"
          shasum -a 256 "dist/${{ matrix.archive_name }}" | awk '{print tolower($1) "  ${{ matrix.archive_name }}"}' > "dist/${{ matrix.archive_name }}.sha256"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ matrix.platform_id }}
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: release-bundle-*
          merge-multiple: true
          path: release

      - name: Generate combined checksum file
        shell: bash
        run: |
          cat release/*.sha256 > release/SHA256SUMS.txt

      - name: Generate stable update manifest
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          WINDOWS_SHA="$(awk '{print $1}' release/RAIS-windows.zip.sha256)"
          MACOS_SHA="$(awk '{print $1}' release/RAIS-macos.zip.sha256)"
          RELEASE_NOTES_URL="https://github.com/${REPOSITORY}/releases/tag/${TAG_NAME}"
          WINDOWS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/RAIS-windows.zip"
          MACOS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/RAIS-macos.zip"
          jq -n \
            --arg version "$VERSION" \
            --arg channel "stable" \
            --arg published_at "$PUBLISHED_AT" \
            --arg release_notes_url "$RELEASE_NOTES_URL" \
            --arg windows_url "$WINDOWS_URL" \
            --arg windows_sha "$WINDOWS_SHA" \
            --arg macos_url "$MACOS_URL" \
            --arg macos_sha "$MACOS_SHA" \
            '{
              version: $version,
              channel: $channel,
              published_at: $published_at,
              release_notes_url: $release_notes_url,
              minimum_supported_previous_version: null,
              assets: {
                windows: {
                  url: $windows_url,
                  sha256: $windows_sha
                },
                macos: {
                  url: $macos_url,
                  sha256: $macos_sha
                }
              }
            }' > release/rais-update-stable.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/RAIS-windows.zip
            release/RAIS-windows.zip.sha256
            release/RAIS-macos.zip
            release/RAIS-macos.zip.sha256
            release/SHA256SUMS.txt
            release/rais-update-stable.json
          generate_release_notes: true
