name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release bundle (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            extension: ".exe"
          - os: windows-11-arm
            platform_id: windows
            extension: ".exe"
          - os: macos-latest
            platform_id: macos
            extension: ""
          - os: macos-13
            platform_id: macos
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Windows GUI build prerequisites (x64)
        if: matrix.platform_id == 'windows' && runner.arch == 'X64'
        shell: pwsh
        run: |
          choco install llvm ninja --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Windows GUI build prerequisites (arm64)
        if: matrix.platform_id == 'windows' && runner.arch == 'ARM64'
        shell: pwsh
        run: |
          # Choco's llvm package is x86_64-only; bindgen rejects it for an
          # aarch64 target ("invalid DLL (x86-64)"). Pull the woa64 LLVM
          # installer and ARM64 Ninja straight from upstream releases.
          $LlvmVersion = "19.1.7"
          $LlvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$LlvmVersion/LLVM-$LlvmVersion-woa64.exe"
          Invoke-WebRequest -Uri $LlvmUrl -OutFile "$env:RUNNER_TEMP\llvm-installer.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\llvm-installer.exe" -ArgumentList "/S" -Wait
          $NinjaUrl = "https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-winarm64.zip"
          Invoke-WebRequest -Uri $NinjaUrl -OutFile "$env:RUNNER_TEMP\ninja.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ninja.zip" -DestinationPath "C:\ninja" -Force
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ninja" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS GUI build prerequisites
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Run release validation
        run: |
          cargo fmt --all --check
          cargo test --workspace

      - name: Build release rabbit binary with GUI feature
        run: cargo build --release -p rabbit --features gui

      - name: Resolve artifact name
        shell: bash
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
          RUNNER_ARCH: ${{ runner.arch }}
          EXTENSION: ${{ matrix.extension }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          case "$RUNNER_ARCH" in
            X64) ARCH="x86_64" ;;
            ARM64) ARCH="aarch64" ;;
            X86) ARCH="i686" ;;
            ARM) ARCH="armv7" ;;
            *) echo "unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
          esac
          ARTIFACT_NAME="rabbit-${VERSION}-${PLATFORM_ID}-${ARCH}${EXTENSION}"
          echo "RABBIT_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RABBIT_ARCH=${ARCH}" >> "$GITHUB_ENV"
          echo "RABBIT_ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Stage Windows release file
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\rabbit.exe "dist\$env:RABBIT_ARTIFACT_NAME" -Force

      - name: Sign Windows binaries (if certificate is configured)
        if: matrix.platform_id == 'windows'
        shell: pwsh
        env:
          WIN_CERT_B64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WIN_CERT_PWD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WIN_CERT_B64) {
            Write-Host "WINDOWS_SIGNING_CERTIFICATE_BASE64 secret is not set; publishing unsigned Windows binaries."
            exit 0
          }
          if (-not $env:WIN_CERT_PWD) {
            Write-Error "WINDOWS_SIGNING_CERTIFICATE_BASE64 was set but WINDOWS_SIGNING_CERTIFICATE_PASSWORD is empty."
            exit 1
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "rabbit-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WIN_CERT_B64))
          try {
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if (-not $signtool) {
              Write-Error "Could not locate signtool.exe under the Windows 10 SDK."
              exit 1
            }
            Write-Host "Using $($signtool.FullName)"
            & $signtool.FullName sign `
              /f $pfxPath `
              /p $env:WIN_CERT_PWD `
              /tr "http://timestamp.digicert.com" `
              /td SHA256 `
              /fd SHA256 `
              dist\${{ env.RABBIT_ARTIFACT_NAME }}
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit $LASTEXITCODE" }
            & $signtool.FullName verify /pa /q dist\${{ env.RABBIT_ARTIFACT_NAME }}
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit $LASTEXITCODE" }
          }
          finally {
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Hash Windows release file
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          $Hash = (Get-FileHash dist\${{ env.RABBIT_ARTIFACT_NAME }} -Algorithm SHA256).Hash.ToLowerInvariant()
          "{0}  {1}" -f $Hash, "${{ env.RABBIT_ARTIFACT_NAME }}" | Set-Content dist\${{ env.RABBIT_ARTIFACT_NAME }}.sha256

      - name: Stage macOS release file
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/rabbit dist/${{ env.RABBIT_ARTIFACT_NAME }}
          chmod +x dist/${{ env.RABBIT_ARTIFACT_NAME }}

      - name: Build macOS .app bundle
        if: matrix.platform_id == 'macos'
        shell: bash
        env:
          RABBIT_BUNDLE_ZIP: ${{ env.RABBIT_ARTIFACT_NAME }}.app.zip
        run: |
          # Assembles dist/Rabbit.app + dist/<RABBIT_BUNDLE_ZIP> with an ad-hoc
          # baseline signature. RABBIT deliberately ships unsigned (no Apple
          # Developer Program enrollment) — ad-hoc signing is the free
          # workaround that prevents the "damaged and can't be opened"
          # Gatekeeper error on Apple Silicon. First-launch trust is
          # cleared by the bundled "Open Me First.command" helper or by
          # `xattr -dr com.apple.quarantine`; future self-updates inherit
          # that trust.
          bash packaging/macos/build-bundle.sh \
            --binary "target/release/rabbit" \
            --version "${RABBIT_VERSION}" \
            --out "dist" \
            --zip-name "${RABBIT_BUNDLE_ZIP}" \
            --adhoc-sign
          shasum -a 256 "dist/${{ env.RABBIT_ARTIFACT_NAME }}" | awk '{print tolower($1) "  ${{ env.RABBIT_ARTIFACT_NAME }}"}' > "dist/${{ env.RABBIT_ARTIFACT_NAME }}.sha256"
          echo "RABBIT_BUNDLE_ZIP=${RABBIT_BUNDLE_ZIP}" >> "$GITHUB_ENV"

      - name: Upload Windows release artifact
        if: matrix.platform_id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: rabbit-${{ matrix.platform_id }}-${{ env.RABBIT_ARCH }}
          path: |
            dist/${{ env.RABBIT_ARTIFACT_NAME }}
            dist/${{ env.RABBIT_ARTIFACT_NAME }}.sha256
          if-no-files-found: error

      - name: Upload macOS release artifact
        if: matrix.platform_id == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: rabbit-${{ matrix.platform_id }}-${{ env.RABBIT_ARCH }}
          path: |
            dist/${{ env.RABBIT_ARTIFACT_NAME }}
            dist/${{ env.RABBIT_ARTIFACT_NAME }}.sha256
            dist/${{ env.RABBIT_BUNDLE_ZIP }}
            dist/${{ env.RABBIT_BUNDLE_ZIP }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rabbit-*
          merge-multiple: true
          path: release

      - name: Generate combined checksum file
        shell: bash
        run: |
          cat release/*.sha256 > release/SHA256SUMS.txt

      - name: Generate stable update manifest
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # The self-update manifest currently points at a single asset per
          # platform, so pick the arch that covers the majority of users:
          # x86_64 on Windows, aarch64 (Apple Silicon) on macOS. Users on
          # Windows ARM or Intel Mac still get release-page downloads, but
          # in-app self-update on those targets is not yet wired up — the
          # manifest schema in rabbit-core/self_update.rs would need a
          # per-arch field for that.
          WINDOWS_PATH="$(find release -maxdepth 1 -type f -name 'rabbit-*-windows-x86_64.exe' ! -name '*.sha256' | head -1)"
          # Bare-binary macOS asset is what the self-updater downloads
          # (it copies bytes straight over the install target — no zip
          # extraction). The Rabbit.app.zip ships alongside for Finder
          # launches and is excluded here.
          MACOS_PATH="$(find release -maxdepth 1 -type f -name 'rabbit-*-macos-aarch64' ! -name '*.sha256' ! -name '*.zip' | head -1)"
          if [ -z "$WINDOWS_PATH" ] || [ -z "$MACOS_PATH" ]; then
            echo "expected per-platform artifacts under release/ but found:" >&2
            ls release/ >&2
            exit 1
          fi
          WINDOWS_NAME="$(basename "$WINDOWS_PATH")"
          MACOS_NAME="$(basename "$MACOS_PATH")"
          WINDOWS_SHA="$(awk '{print $1}' "${WINDOWS_PATH}.sha256")"
          MACOS_SHA="$(awk '{print $1}' "${MACOS_PATH}.sha256")"
          RELEASE_NOTES_URL="https://github.com/${REPOSITORY}/releases/tag/${TAG_NAME}"
          WINDOWS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${WINDOWS_NAME}"
          MACOS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${MACOS_NAME}"
          jq -n \
            --arg version "$VERSION" \
            --arg channel "stable" \
            --arg published_at "$PUBLISHED_AT" \
            --arg release_notes_url "$RELEASE_NOTES_URL" \
            --arg windows_url "$WINDOWS_URL" \
            --arg windows_sha "$WINDOWS_SHA" \
            --arg macos_url "$MACOS_URL" \
            --arg macos_sha "$MACOS_SHA" \
            '{
              version: $version,
              channel: $channel,
              published_at: $published_at,
              release_notes_url: $release_notes_url,
              minimum_supported_previous_version: null,
              assets: {
                windows: {
                  url: $windows_url,
                  sha256: $windows_sha
                },
                macos: {
                  url: $macos_url,
                  sha256: $macos_sha
                }
              }
            }' > release/rabbit-update-stable.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/rabbit-*
            release/SHA256SUMS.txt
            release/rabbit-update-stable.json
          generate_release_notes: true
