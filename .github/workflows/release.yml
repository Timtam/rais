name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release bundle (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows
            extension: ".exe"
          - os: macos-latest
            platform_id: macos
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Windows GUI build prerequisites
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          choco install llvm ninja --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS GUI build prerequisites
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Run release validation
        run: |
          cargo fmt --all --check
          cargo test --workspace

      - name: Build release rais binary with GUI feature
        run: cargo build --release -p rais --features gui

      - name: Resolve artifact name
        shell: bash
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
          RUNNER_ARCH: ${{ runner.arch }}
          EXTENSION: ${{ matrix.extension }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          case "$RUNNER_ARCH" in
            X64) ARCH="x86_64" ;;
            ARM64) ARCH="aarch64" ;;
            X86) ARCH="i686" ;;
            ARM) ARCH="armv7" ;;
            *) echo "unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
          esac
          ARTIFACT_NAME="rais-${VERSION}-${PLATFORM_ID}-${ARCH}${EXTENSION}"
          echo "RAIS_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RAIS_ARCH=${ARCH}" >> "$GITHUB_ENV"
          echo "RAIS_ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Stage Windows release file
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\rais.exe "dist\$env:RAIS_ARTIFACT_NAME" -Force

      - name: Sign Windows binaries (if certificate is configured)
        if: matrix.platform_id == 'windows'
        shell: pwsh
        env:
          WIN_CERT_B64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WIN_CERT_PWD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WIN_CERT_B64) {
            Write-Host "WINDOWS_SIGNING_CERTIFICATE_BASE64 secret is not set; publishing unsigned Windows binaries."
            exit 0
          }
          if (-not $env:WIN_CERT_PWD) {
            Write-Error "WINDOWS_SIGNING_CERTIFICATE_BASE64 was set but WINDOWS_SIGNING_CERTIFICATE_PASSWORD is empty."
            exit 1
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "rais-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WIN_CERT_B64))
          try {
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if (-not $signtool) {
              Write-Error "Could not locate signtool.exe under the Windows 10 SDK."
              exit 1
            }
            Write-Host "Using $($signtool.FullName)"
            & $signtool.FullName sign `
              /f $pfxPath `
              /p $env:WIN_CERT_PWD `
              /tr "http://timestamp.digicert.com" `
              /td SHA256 `
              /fd SHA256 `
              dist\${{ env.RAIS_ARTIFACT_NAME }}
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit $LASTEXITCODE" }
            & $signtool.FullName verify /pa /q dist\${{ env.RAIS_ARTIFACT_NAME }}
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit $LASTEXITCODE" }
          }
          finally {
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Hash Windows release file
        if: matrix.platform_id == 'windows'
        shell: pwsh
        run: |
          $Hash = (Get-FileHash dist\${{ env.RAIS_ARTIFACT_NAME }} -Algorithm SHA256).Hash.ToLowerInvariant()
          "{0}  {1}" -f $Hash, "${{ env.RAIS_ARTIFACT_NAME }}" | Set-Content dist\${{ env.RAIS_ARTIFACT_NAME }}.sha256

      - name: Stage macOS release file
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/rais dist/${{ env.RAIS_ARTIFACT_NAME }}
          chmod +x dist/${{ env.RAIS_ARTIFACT_NAME }}

      - name: Sign macOS binaries (if certificate is configured)
        if: matrix.platform_id == 'macos'
        shell: bash
        env:
          MAC_CERT_B64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_BASE64 }}
          MAC_CERT_PWD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MAC_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$MAC_CERT_B64" ]; then
            echo "MACOS_SIGNING_CERTIFICATE_BASE64 secret is not set; publishing unsigned macOS binaries."
            exit 0
          fi
          if [ -z "$MAC_CERT_PWD" ] || [ -z "$MAC_SIGNING_IDENTITY" ]; then
            echo "MACOS_SIGNING_CERTIFICATE_BASE64 was set but MACOS_SIGNING_CERTIFICATE_PASSWORD or MACOS_SIGNING_IDENTITY is empty." >&2
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/rais-codesign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/rais-codesign.p12"
          echo "$MAC_CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_CERT_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          /usr/bin/codesign --force --options runtime --timestamp \
            --sign "$MAC_SIGNING_IDENTITY" \
            dist/${{ env.RAIS_ARTIFACT_NAME }}
          /usr/bin/codesign --verify --strict --verbose=2 dist/${{ env.RAIS_ARTIFACT_NAME }}
          rm -f "$CERT_PATH"

      - name: Hash macOS release file
        if: matrix.platform_id == 'macos'
        shell: bash
        run: |
          shasum -a 256 "dist/${{ env.RAIS_ARTIFACT_NAME }}" | awk '{print tolower($1) "  ${{ env.RAIS_ARTIFACT_NAME }}"}' > "dist/${{ env.RAIS_ARTIFACT_NAME }}.sha256"

      - name: Notarize macOS binary (if notary credentials are configured)
        if: matrix.platform_id == 'macos'
        shell: bash
        env:
          MAC_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MAC_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MAC_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          if [ -z "$MAC_NOTARY_APPLE_ID" ] || [ -z "$MAC_NOTARY_TEAM_ID" ] || [ -z "$MAC_NOTARY_PASSWORD" ]; then
            echo "Notary credentials not configured; skipping notarization."
            exit 0
          fi
          # notarytool requires a zip, dmg, or pkg. Build a throwaway zip
          # purely as a notary submission carrier; we do not publish it.
          NOTARY_ZIP="$RUNNER_TEMP/rais-notary.zip"
          ditto -c -k --keepParent "dist/${{ env.RAIS_ARTIFACT_NAME }}" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$MAC_NOTARY_APPLE_ID" \
            --team-id "$MAC_NOTARY_TEAM_ID" \
            --password "$MAC_NOTARY_PASSWORD" \
            --wait
          rm -f "$NOTARY_ZIP"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rais-${{ matrix.platform_id }}-${{ env.RAIS_ARCH }}
          path: |
            dist/${{ env.RAIS_ARTIFACT_NAME }}
            dist/${{ env.RAIS_ARTIFACT_NAME }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rais-*
          merge-multiple: true
          path: release

      - name: Generate combined checksum file
        shell: bash
        run: |
          cat release/*.sha256 > release/SHA256SUMS.txt

      - name: Generate stable update manifest
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Find the per-platform artifacts by their `rais-<version>-<os>-<arch>`
          # filenames. Glob matches the binary itself (any arch) and excludes
          # the sidecar `.sha256` file.
          WINDOWS_PATH="$(find release -maxdepth 1 -type f -name 'rais-*-windows-*.exe' ! -name '*.sha256' | sort | head -1)"
          MACOS_PATH="$(find release -maxdepth 1 -type f -name 'rais-*-macos-*' ! -name '*.exe' ! -name '*.sha256' | sort | head -1)"
          if [ -z "$WINDOWS_PATH" ] || [ -z "$MACOS_PATH" ]; then
            echo "expected per-platform artifacts under release/ but found:" >&2
            ls release/ >&2
            exit 1
          fi
          WINDOWS_NAME="$(basename "$WINDOWS_PATH")"
          MACOS_NAME="$(basename "$MACOS_PATH")"
          WINDOWS_SHA="$(awk '{print $1}' "${WINDOWS_PATH}.sha256")"
          MACOS_SHA="$(awk '{print $1}' "${MACOS_PATH}.sha256")"
          RELEASE_NOTES_URL="https://github.com/${REPOSITORY}/releases/tag/${TAG_NAME}"
          WINDOWS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${WINDOWS_NAME}"
          MACOS_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${MACOS_NAME}"
          jq -n \
            --arg version "$VERSION" \
            --arg channel "stable" \
            --arg published_at "$PUBLISHED_AT" \
            --arg release_notes_url "$RELEASE_NOTES_URL" \
            --arg windows_url "$WINDOWS_URL" \
            --arg windows_sha "$WINDOWS_SHA" \
            --arg macos_url "$MACOS_URL" \
            --arg macos_sha "$MACOS_SHA" \
            '{
              version: $version,
              channel: $channel,
              published_at: $published_at,
              release_notes_url: $release_notes_url,
              minimum_supported_previous_version: null,
              assets: {
                windows: {
                  url: $windows_url,
                  sha256: $windows_sha
                },
                macos: {
                  url: $macos_url,
                  sha256: $macos_sha
                }
              }
            }' > release/rais-update-stable.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/rais-*
            release/SHA256SUMS.txt
            release/rais-update-stable.json
          generate_release_notes: true
